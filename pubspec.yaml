name: vitalseker
description: VitalSeker AI Health Companion - Your Intelligent Health Passport
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Supabase
  supabase_flutter: ^2.6.0

  # Crash Monitoring (per Cahier des Charges Section 3)
  sentry_flutter: ^8.9.0

  # Push Notifications (per Cahier des Charges Section 3: OneSignal)
  onesignal_flutter: ^5.2.0

  # Analytics (per Cahier des Charges Section 3: PostHog)
  posthog_flutter: ^4.0.0

  # In-App Purchases (per Cahier des Charges Section 3: RevenueCat)
  purchases_flutter: ^8.0.0

  # Offline Storage (per Cahier des Charges Section 2.3: Mode Hors-Ligne)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  
  # Routing
  go_router: ^14.2.0
  
  # Environment
  flutter_dotenv: ^5.2.0
  
  # UI & Animations
  flutter_animate: ^4.5.0
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # PDF Export
  pdf: ^3.10.8
  
  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3
  
  # Serialization
  json_annotation: ^4.9.0
  
  # Utils
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  geolocator: ^12.0.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  # Voice notes in AI chat — real-time speech-to-text transcription
  speech_to_text: ^7.0.0
  # Medical records file upload — pick files from device
  file_picker: ^8.0.0
  # Image cropping for document scanner
  image_cropper: ^8.0.0
  # Connectivity detection for online/offline indicator
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/branding/
    - assets/fonts/
    - assets/design/
  
  fonts:
    - family: ClashDisplay
      fonts:
        - asset: assets/fonts/ClashDisplay-Regular.otf
        - asset: assets/fonts/ClashDisplay-Medium.otf
          weight: 500
        - asset: assets/fonts/ClashDisplay-Semibold.otf
          weight: 600
        - asset: assets/fonts/ClashDisplay-Bold.otf
          weight: 700
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
