# flutter_launcher_icons configuration
#
# Regenerate all platform launcher icons (Android + iOS) from the brand
# icon asset by running:
#
#   dart pub global activate flutter_launcher_icons
#   flutter pub run flutter_launcher_icons
#
# Or with the dev_dependency in pubspec.yaml:
#
#   flutter pub get
#   dart run flutter_launcher_icons
#
# This config is provided for future use. The Android icons were also
# pre-generated directly via Pillow (see scripts/generate_android_icons.py)
# so the build works without needing to install flutter_launcher_icons.

flutter_launcher_icons:
  # Source image: 1254x1254 PNG, designed by Keter Marketing
  image_path: "assets/images/branding/app_icon.png"

  # Android settings
  android: true
  min_sdk_android: 24
  adaptive_icon_background: "#0B7A5B"   # VitalGreen
  adaptive_icon_foreground: "assets/images/branding/app_icon.png"

  # iOS settings
  ios: true
  remove_alpha_ios: true                # iOS icons must not have alpha
  background_color_ios: "#0B7A5B"

  # Web (for future PWA support)
  web:
    generate: true
    image_path: "assets/images/branding/app_icon.png"
    background_color: "#0B7A5B"
    theme_color: "#0B7A5B"

  # Windows / macOS (for future desktop builds)
  windows:
    generate: false
  macos:
    generate: false
